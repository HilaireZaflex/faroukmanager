services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────────
  - type: web
    name: faroukmanager-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: faroukmanager-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@faroukmanager.com
      - key: ADMIN_PASSWORD
        value: Admin2026!
      - key: ADMIN_NAME
        value: Administrateur
      - key: ALLOWED_ORIGINS
        value: '["https://faroukmanager-frontend.onrender.com","http://localhost:3000"]'

  # ── Frontend React ───────────────────────────────────────────────────────────
  - type: web
    name: faroukmanager-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://faroukmanager-backend.onrender.com/api

# ── Base de données PostgreSQL gratuite ─────────────────────────────────────
databases:
  - name: faroukmanager-db
    plan: free
    databaseName: faroukmanager
    user: faroukmanager
